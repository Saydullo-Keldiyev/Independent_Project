# Redis StatefulSet — persistent storage, stable network identity (DEVELOPMENT ONLY)
# For production HA, use Redis Cluster configuration in ../data/redis-cluster.yaml
# Production setup: 6 nodes (3 masters + 3 replicas) across 3 AZs with automatic failover
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: auction-system
  labels:
    app: redis
spec:
  serviceName: redis-headless
  replicas: 1   # scale to 3 with Redis Sentinel for HA

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--appendonly"
            - "yes"
            - "--maxmemory"
            - "512mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auction-system-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: redis-data
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd   # use your cloud provider's SSD class
        resources:
          requests:
            storage: 10Gi
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: auction-system
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379
---
# ClusterIP service for application access
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: auction-system
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
