openapi: 3.0.3
info:
  title: Bid Service API
  description: |
    Handles bid placement, bid history, real-time WebSocket updates, and auction bid queries.

    ## API Versioning
    - Current versions: v1
    - Version prefix: /api/v1
    - Backward compatibility guaranteed within major version for 6 months minimum
    - Deprecated versions include `Deprecation` header with sunset date (RFC 7231)
    - After sunset date, endpoints return HTTP 410

    ## Deprecation Policy
    - Deprecated endpoints are announced 90+ days before removal
    - CHANGELOG.md documents all additions, deprecations, and breaking changes
  version: 1.0.0
  contact:
    name: Platform Team
    email: platform@auction.com

servers:
  - url: http://localhost:8083
    description: Local Development (Direct)
  - url: http://localhost:8080
    description: Local Development (via API Gateway)
  - url: https://api.auction.com
    description: Production

tags:
  - name: Bids
    description: Bid placement and history
  - name: WebSocket
    description: Real-time bid updates
  - name: Health
    description: Service health endpoints

paths:
  /api/v1/bids:
    post:
      tags: [Bids]
      operationId: placeBid
      summary: Place a bid on an auction
      description: |
        Places a bid with distributed lock acquisition and wallet fund hold.
        Rate limited to 30 req/min per user.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBidRequest'
      responses:
        '201':
          description: Bid placed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidResponse'
        '400':
          description: Validation error (bid too low, auction not active, insufficient balance)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '413':
          description: Request payload too large (>1MB)
        '429':
          description: Rate limit exceeded or auction busy (lock contention)
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until rate limit resets

  /api/v1/bids/me:
    get:
      tags: [Bids]
      operationId: getMyBids
      summary: Get current user's bid history
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: User's bid history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidListResponse'
        '401':
          description: Unauthorized

  /api/v1/auctions/{id}/bids:
    get:
      tags: [Bids]
      operationId: getAuctionBids
      summary: Get bids for an auction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Auction bid list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidListResponse'
        '400':
          description: Invalid UUID format
        '404':
          description: Auction not found

  /api/v1/auctions/{id}/bid-history:
    get:
      tags: [Bids]
      operationId: getAuctionBidHistory
      summary: Get full bid timeline for an auction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Complete bid timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidListResponse'

  /api/v1/auctions/{id}/min-bid:
    get:
      tags: [Bids]
      operationId: getMinimumBid
      summary: Get minimum valid bid amount for an auction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Minimum bid information
          content:
            application/json:
              schema:
                type: object
                properties:
                  min_amount:
                    type: number
                    format: double
                  current_price:
                    type: number
                    format: double
                  increment:
                    type: number
                    format: double

  /api/v1/ws/{auction_id}:
    get:
      tags: [WebSocket]
      operationId: websocketBidUpdates
      summary: WebSocket connection for real-time bid updates
      description: |
        Upgrades to WebSocket connection. Receives JSON messages on new bids.
        Max 10000 connections per pod. Idle connections (no heartbeat for 5 min)
        are terminated with a close frame.

        Message format:
        ```json
        {"type":"new_bid","auction_id":"...","amount":1500.00,"user_id":"...","timestamp":"..."}
        ```
      security:
        - BearerAuth: []
      parameters:
        - name: auction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: WebSocket upgrade successful
        '401':
          description: Unauthorized
        '503':
          description: WebSocket capacity exceeded

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive

  /ready:
    get:
      tags: [Health]
      operationId: readinessCheck
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
        '503':
          description: Dependencies unhealthy

  /metrics:
    get:
      tags: [Health]
      operationId: getMetrics
      summary: Prometheus metrics endpoint
      responses:
        '200':
          description: Prometheus text format metrics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateBidRequest:
      type: object
      required: [auction_id, amount]
      properties:
        auction_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
          maximum: 999999999.99
          description: Must be positive, max 2 decimal places

    BidResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        auction_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        created_at:
          type: string
          format: date-time

    BidListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            bids:
              type: array
              items:
                $ref: '#/components/schemas/BidResponse'
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
        correlation_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
