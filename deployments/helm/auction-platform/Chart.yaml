apiVersion: v2
name: auction-platform
description: Production-grade real-time auction platform
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - auction
  - microservices
  - real-time
  - websocket
maintainers:
  - name: Auction Team
    email: team@auction.com
dependencies:
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: kafka
    version: "26.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
  - name: postgresql
    version: "14.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
