# Istio Gateway — entry point for external traffic into the mesh.
# Replaces NGINX Ingress when using Istio.
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: auction-gateway
  namespace: auction-system
spec:
  selector:
    istio: ingressgateway   # use Istio's default ingress gateway
  servers:
    # HTTPS — production
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: auction-tls-cert   # TLS cert from cert-manager
      hosts:
        - api.auction.com

    # HTTP → redirect to HTTPS
    - port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: true
      hosts:
        - api.auction.com
