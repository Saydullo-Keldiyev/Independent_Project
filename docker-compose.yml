# ═══════════════════════════════════════════════════════════════════════════════
# AUCTION SYSTEM — Full Stack Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
# Usage:
#   docker-compose up --build -d     # start all (first time)
#   docker-compose up -d             # start all (after build)
#   docker-compose logs -f           # watch all logs
#   docker-compose logs -f bid-service  # watch one service
#   docker-compose down              # stop all
#   docker-compose down -v           # stop + delete data

services:

  # ── INFRASTRUCTURE ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: auction-postgres
    environment:
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: auction_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/auction-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/01_auction.sql:ro
      - ./services/user-service/migrations/001_initial.sql:/docker-entrypoint-initdb.d/02_user.sql:ro
      - ./services/payment-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/03_payment.sql:ro
      - ./services/notification-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/04_notification.sql:ro
      - ./services/analytics-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/05_analytics.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auction_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: auction-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: auction-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: auction-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ── APPLICATION SERVICES ────────────────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: auction-user-service
    ports:
      - "8081:8081"
    environment:
      APP_PORT: "8081"
      APP_ENV: development
      DB_URL: postgres://auction:secret@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: super-secret-jwt-key-for-dev-only
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: user-events
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  auction-service:
    build:
      context: .
      dockerfile: services/auction-service/Dockerfile
    container_name: auction-auction-service
    ports:
      - "8083:8083"
    environment:
      APP_PORT: "8083"
      APP_ENV: development
      DB_URL: postgres://auction:secret@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: super-secret-jwt-key-for-dev-only
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: auction-events
      SCHEDULER_INTERVAL_SECONDS: "5"
      LOCK_TTL_SECONDS: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  bid-service:
    build:
      context: .
      dockerfile: services/bid-service/Dockerfile
    container_name: auction-bid-service
    ports:
      - "8082:8082"
    environment:
      APP_PORT: "8082"
      APP_ENV: development
      DB_URL: postgres://auction:secret@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: super-secret-jwt-key-for-dev-only
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: bid-events
      KAFKA_GROUP_ID: bid-service
      LOCK_TTL_SECONDS: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: auction-payment-service
    ports:
      - "8085:8085"
    environment:
      APP_PORT: "8085"
      APP_ENV: development
      DB_URL: postgres://auction:secret@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      JWT_SECRET: super-secret-jwt-key-for-dev-only
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: payment-events
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: auction-notification-service
    ports:
      - "8084:8084"
    environment:
      APP_PORT: "8084"
      APP_ENV: development
      DB_URL: postgres://auction:secret@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPICS: bid-events,auction-events,payment-events
      KAFKA_GROUP_ID: notification-service-group
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: auction-api-gateway
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      APP_ENV: development
      JWT_SECRET: super-secret-jwt-key-for-dev-only
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      USER_SERVICE_URL: http://user-service:8081
      AUCTION_SERVICE_URL: http://auction-service:8083
      BID_SERVICE_URL: http://bid-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      RATE_LIMIT_RPS: "100"
      RATE_LIMIT_BURST: "20"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      - user-service
      - auction-service
      - bid-service
      - notification-service
      - payment-service
    restart: unless-stopped

  # ── FRONTEND ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auction-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8082
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
