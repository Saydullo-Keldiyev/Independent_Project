# Allow DNS egress for all pods in auction-system namespace
# Required for service discovery (kube-dns/coredns)
# Requirement 20.7: explicit egress allow for required external endpoints (DNS)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: auction-system
  labels:
    app.kubernetes.io/part-of: auction-system
    app.kubernetes.io/component: network-security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
