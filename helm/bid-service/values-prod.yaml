# Production overrides — full HA, strict security
replicaCount: 3

autoscaling:
  minReplicas: 3
  maxReplicas: 20

ingress:
  enabled: true
  host: api.auction.com
  tls:
    enabled: true

podAntiAffinity:
  required: true   # hard requirement — never 2 pods on same node

env:
  APP_ENV: production
