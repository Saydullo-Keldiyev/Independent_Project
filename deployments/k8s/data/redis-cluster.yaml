# Redis Cluster — 3 master nodes + 3 replicas across availability zones
# Requirements: 17.3 - Redis cluster with 3+ master nodes across AZs, failover within 15s
#
# Redis Cluster provides:
#   - Automatic sharding across 3 masters
#   - Each master has 1 replica in a different AZ
#   - Automatic failover within 10-15 seconds via cluster protocol
#   - No external dependency (Sentinel not needed)
#
# Topology:
#   AZ-1: redis-cluster-0 (master), redis-cluster-3 (replica of master in AZ-2)
#   AZ-2: redis-cluster-1 (master), redis-cluster-4 (replica of master in AZ-3)
#   AZ-3: redis-cluster-2 (master), redis-cluster-5 (replica of master in AZ-1)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-config
  namespace: auction-system
  labels:
    app: redis-cluster
data:
  redis.conf: |
    # Cluster configuration
    cluster-enabled yes
    cluster-config-file nodes.conf
    cluster-node-timeout 15000
    # Failover settings — failover within 15 seconds
    # cluster-node-timeout controls how long before a node is considered failing
    # Actual failover = node-timeout + election delay (typically 1-2s)
    cluster-replica-validity-factor 0
    cluster-allow-reads-when-down no
    cluster-require-full-coverage yes

    # Persistence
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10
    save 60 10000

    # Memory management
    maxmemory 1gb
    maxmemory-policy allkeys-lru

    # Security
    requirepass REDIS_PASSWORD_PLACEHOLDER
    masterauth REDIS_PASSWORD_PLACEHOLDER

    # Networking
    bind 0.0.0.0
    protected-mode no
    tcp-backlog 511
    timeout 300
    tcp-keepalive 60

    # Performance
    hz 10
    dynamic-hz yes
    io-threads 2

  init-cluster.sh: |
    #!/bin/bash
    set -e

    # Wait for all 6 nodes to be ready
    echo "Waiting for all Redis cluster nodes to be ready..."
    for i in $(seq 0 5); do
      until redis-cli -h redis-cluster-${i}.redis-cluster-headless.auction-system.svc.cluster.local \
        -a "${REDIS_PASSWORD}" ping | grep -q PONG; do
        echo "Waiting for redis-cluster-${i}..."
        sleep 2
      done
      echo "redis-cluster-${i} is ready"
    done

    # Check if cluster is already initialized
    CLUSTER_INFO=$(redis-cli -h redis-cluster-0.redis-cluster-headless.auction-system.svc.cluster.local \
      -a "${REDIS_PASSWORD}" cluster info 2>/dev/null || true)

    if echo "$CLUSTER_INFO" | grep -q "cluster_state:ok"; then
      echo "Cluster already initialized, skipping..."
      exit 0
    fi

    echo "Creating Redis Cluster with 3 masters and 3 replicas..."
    redis-cli --cluster create \
      redis-cluster-0.redis-cluster-headless.auction-system.svc.cluster.local:6379 \
      redis-cluster-1.redis-cluster-headless.auction-system.svc.cluster.local:6379 \
      redis-cluster-2.redis-cluster-headless.auction-system.svc.cluster.local:6379 \
      redis-cluster-3.redis-cluster-headless.auction-system.svc.cluster.local:6379 \
      redis-cluster-4.redis-cluster-headless.auction-system.svc.cluster.local:6379 \
      redis-cluster-5.redis-cluster-headless.auction-system.svc.cluster.local:6379 \
      --cluster-replicas 1 \
      --cluster-yes \
      -a "${REDIS_PASSWORD}"

    echo "Redis Cluster initialized successfully"
    redis-cli -h redis-cluster-0.redis-cluster-headless.auction-system.svc.cluster.local \
      -a "${REDIS_PASSWORD}" cluster info

---
# StatefulSet — 6 nodes (3 masters + 3 replicas)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: auction-system
  labels:
    app: redis-cluster
    component: cache
    part-of: auction-system
spec:
  serviceName: redis-cluster-headless
  replicas: 6
  podManagementPolicy: Parallel

  selector:
    matchLabels:
      app: redis-cluster

  template:
    metadata:
      labels:
        app: redis-cluster
        component: cache
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      # Spread pods across AZs — at most 2 per zone (ensures coverage of 3 AZs)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: redis-cluster

      # Anti-affinity: never 2 Redis pods on same node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: redis-cluster
              topologyKey: kubernetes.io/hostname

      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999

      initContainers:
        - name: init-config
          image: redis:7.2-alpine
          command:
            - sh
            - -c
            - |
              cp /config/redis.conf /data/redis.conf
              sed -i "s/REDIS_PASSWORD_PLACEHOLDER/${REDIS_PASSWORD}/g" /data/redis.conf
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-cluster-secret
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /config

      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - /data/redis.conf
          ports:
            - name: redis
              containerPort: 6379
            - name: gossip
              containerPort: 16379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-cluster-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data

        # Redis Exporter sidecar for Prometheus metrics
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.58.0-alpine
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-cluster-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

      volumes:
        - name: redis-config
          configMap:
            name: redis-cluster-config
            items:
              - key: redis.conf
                path: redis.conf

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 10Gi

---
# Headless service for cluster internal communication
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-headless
  namespace: auction-system
  labels:
    app: redis-cluster
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: redis-cluster
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: gossip
      port: 16379
      targetPort: 16379

---
# ClusterIP service for application access (Redis Cluster client connects to any node)
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: auction-system
  labels:
    app: redis-cluster
spec:
  type: ClusterIP
  selector:
    app: redis-cluster
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
# Secret for Redis password
apiVersion: v1
kind: Secret
metadata:
  name: redis-cluster-secret
  namespace: auction-system
  labels:
    app: redis-cluster
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"  # Replace with SealedSecret or Vault reference

---
# PodDisruptionBudget — keep at least 4 of 6 nodes running (maintains quorum)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-cluster-pdb
  namespace: auction-system
  labels:
    app: redis-cluster
spec:
  minAvailable: 4
  selector:
    matchLabels:
      app: redis-cluster

---
# Job to initialize the cluster (run once after StatefulSet is ready)
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-cluster-init
  namespace: auction-system
  labels:
    app: redis-cluster
    component: init
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: cluster-init
          image: redis:7.2-alpine
          command:
            - sh
            - /scripts/init-cluster.sh
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-cluster-secret
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: redis-cluster-config
            items:
              - key: init-cluster.sh
                path: init-cluster.sh
            defaultMode: 0755

---
# ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-cluster-monitor
  namespace: auction-system
  labels:
    app: redis-cluster
spec:
  selector:
    matchLabels:
      app: redis-cluster
  endpoints:
    - port: metrics
      interval: 15s
