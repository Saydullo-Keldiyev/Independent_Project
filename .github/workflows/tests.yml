name: Full Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit Tests (all services) ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/bid-service
          - services/user-service
          - services/payment-service
          - services/notification-service
          - services/search-service
          - services/analytics-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Run tests — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          go mod download
          go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
        continue-on-error: true

  # ── Integration Tests ────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: auction_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run integration tests
        env:
          DB_URL: postgres://auction:secret@localhost:5432/auction_db?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: |
          if [ -d "tests/integration" ]; then
            cd tests/integration
            go test -race -timeout 120s ./...
          fi

  # ── Load Tests (on main only) ───────────────────────────────────────────────
  load-tests:
    name: Load Tests (Smoke)
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run smoke load test (30s, 10 VUs)
        run: |
          k6 run tests/load/k6/bid_load_test.js \
            --duration 30s \
            --vus 10 \
            --env BASE_URL=http://localhost:8080 \
            --env AUTH_TOKEN=test \
            || true  # don't fail CI on load test
        continue-on-error: true
