# NetworkPolicy for bid-service
# Requirement 20.1: api-gateway to bid-service, bid-service to auction-service
# Requirement 20.2: Explicit ingress allow rules
# Requirement 20.7: Explicit egress allow rules
#
# Ingress: from api-gateway only
# Egress: to auction-service, PostgreSQL, Redis, Kafka
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bid-service-ingress
  namespace: auction-system
  labels:
    app.kubernetes.io/part-of: auction-system
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      app: bid-service
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from api-gateway
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8082
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8082

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bid-service-egress
  namespace: auction-system
  labels:
    app.kubernetes.io/part-of: auction-system
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      app: bid-service
  policyTypes:
    - Egress
  egress:
    # To auction-service (declared dependency per Req 20.1)
    - to:
        - podSelector:
            matchLabels:
              app: auction-service
      ports:
        - protocol: TCP
          port: 8083
    # To payment-service (fund holds)
    - to:
        - podSelector:
            matchLabels:
              app: payment-service
      ports:
        - protocol: TCP
          port: 8085
    # To PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auction-system
          podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # To Redis (distributed lock, caching)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auction-system
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # To Kafka (event publishing)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auction-system
          podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
