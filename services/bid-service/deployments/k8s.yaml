apiVersion: apps/v1
kind: Deployment
metadata:
  name: bid-service
  labels:
    app: bid-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bid-service
  template:
    metadata:
      labels:
        app: bid-service
    spec:
      containers:
        - name: bid-service
          image: auction/bid-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: APP_PORT
              value: "8082"
            - name: APP_ENV
              value: "production"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: bid-service-secrets
                  key: db-url
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: bid-service-config
                  key: redis-addr
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: bid-service-config
                  key: kafka-brokers
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bid-service-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bid-service
spec:
  selector:
    app: bid-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8082
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bid-service-config
data:
  redis-addr: "redis:6379"
  kafka-brokers: "kafka:9092"
  kafka-topic: "bid-events"
