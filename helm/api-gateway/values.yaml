replicaCount: 3

image:
  repository: ghcr.io/Saydullo-Keldiyev/api-gateway
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

startupProbe:
  path: /health
  failureThreshold: 30
  periodSeconds: 2

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

podAntiAffinity:
  enabled: true
  required: false

topologySpread:
  enabled: true

terminationGracePeriodSeconds: 30
preStopSleepSeconds: 5

env:
  APP_ENV: production
  APP_PORT: "8080"

configMapRef: auction-system-config
secretRef: auction-system-secrets
serviceAccount:
  name: auction-service-account

observability:
  prometheus:
    enabled: true
    port: 8080
    path: /metrics
  tracing:
    enabled: true
    otlpEndpoint: jaeger-collector.monitoring.svc.cluster.local:4318

nodeSelector: {}
tolerations: []
