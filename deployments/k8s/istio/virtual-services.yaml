# VirtualService — traffic routing rules for each service.
# Controls: retries, timeouts, canary splits, fault injection.

# ── API Gateway ───────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway
  namespace: auction-system
spec:
  hosts:
    - api-gateway
    - api.auction.com
  gateways:
    - auction-gateway
    - mesh   # also applies inside the mesh
  http:
    - match:
        - uri:
            prefix: /api/v1
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: "gateway-error,connect-failure,retriable-4xx"
      route:
        - destination:
            host: api-gateway
            port:
              number: 80
---
# ── Bid Service — with canary traffic split ───────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: bid-service
  namespace: auction-system
spec:
  hosts:
    - bid-service
  http:
    - timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: "gateway-error,connect-failure,reset"
      # Canary: 90% stable, 10% canary
      # Remove canary block when not doing canary deploy
      route:
        - destination:
            host: bid-service
            subset: stable
          weight: 90
        - destination:
            host: bid-service
            subset: canary
          weight: 10
---
# ── User Service ──────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: user-service
  namespace: auction-system
spec:
  hosts:
    - user-service
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "gateway-error,connect-failure,reset"
      route:
        - destination:
            host: user-service
            port:
              number: 80
---
# ── Auction Service ───────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: auction-service
  namespace: auction-system
spec:
  hosts:
    - auction-service
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "gateway-error,connect-failure,reset"
      route:
        - destination:
            host: auction-service
            port:
              number: 80
