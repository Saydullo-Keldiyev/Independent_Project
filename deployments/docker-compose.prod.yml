version: "3.9"

# Production docker-compose for VPS/single-server deployment
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: auction_db
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    restart: always
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Application Services ────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: deployments/docker/gateway.Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      APP_ENV: production
      USER_SERVICE_URL: http://user-service:8081
      AUCTION_SERVICE_URL: http://auction-service:8083
      BID_SERVICE_URL: http://bid-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      JWT_SECRET: ${JWT_SECRET}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    depends_on:
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: deployments/docker/user.Dockerfile
    restart: always
    environment:
      APP_PORT: "8081"
      APP_ENV: production
      DB_URL: postgres://auction:${DB_PASSWORD:-changeme}@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: user-events
      KAFKA_AUCTION_TOPIC: auction-events
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  auction-service:
    build:
      context: .
      dockerfile: deployments/docker/auction.Dockerfile
    restart: always
    environment:
      APP_PORT: "8083"
      APP_ENV: production
      DB_URL: postgres://auction:${DB_PASSWORD:-changeme}@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: auction-events
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  bid-service:
    build:
      context: .
      dockerfile: deployments/docker/bid.Dockerfile
    restart: always
    environment:
      APP_PORT: "8082"
      APP_ENV: production
      DB_URL: postgres://auction:${DB_PASSWORD:-changeme}@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: bid-events
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: deployments/docker/notification.Dockerfile
    restart: always
    environment:
      APP_PORT: "8084"
      APP_ENV: production
      DB_URL: postgres://auction:${DB_PASSWORD:-changeme}@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPICS: bid-events,auction-events
      KAFKA_GROUP_ID: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:8080
      NEXT_PUBLIC_WS_URL: ws://api-gateway:8080

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - frontend

volumes:
  postgres_data:
  redis_data:
  kafka_data:
