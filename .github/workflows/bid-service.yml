name: Bid Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "services/bid-service/**"
      - ".github/workflows/bid-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/bid-service/**"

env:
  SERVICE:      bid-service
  SERVICE_PATH: services/bid-service
  REGISTRY:     ghcr.io
  IMAGE:        ghcr.io/${{ github.repository_owner }}/bid-service
  GO_VERSION:   "1.22"

jobs:
  # ── Job 1: Test + Lint ──────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/bid-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/bid-service/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies (no tampering)
        run: go mod verify

      - name: Run tests with race detector
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check test coverage threshold (>= 70%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% passes threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: services/bid-service/coverage.out
          flags: bid-service
        continue-on-error: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/bid-service
          args: --timeout=5m

  # ── Job 2: Security Scan (SAST) ─────────────────────────────────────────────
  security-sast:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # gosec — Go security checker
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: "-fmt sarif -out gosec-results.sarif ./services/bid-service/..."
        continue-on-error: true

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif
        continue-on-error: true

      # govulncheck — official Go vulnerability scanner
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./services/bid-service/...

  # ── Job 3: Build & Push Docker Image ───────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security-sast]
    # Only push on main branch, not PRs
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
      id-token: write   # for cosign keyless signing

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag:    ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags: commit SHA + branch + semver
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      # Build with cache — faster CI
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/bid.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args for reproducibility
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      # Generate SBOM (Software Bill of Materials)
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          artifact-name: sbom-bid-service.spdx.json
          output-file: sbom-bid-service.spdx.json

      # Sign image with Cosign (keyless, OIDC-based)
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image
        run: |
          cosign sign --yes \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

  # ── Job 4: Container Vulnerability Scan ────────────────────────────────────
  scan-image:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Trivy — scan for CVEs, secrets, misconfigs
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"   # fail pipeline on CRITICAL/HIGH CVEs
        continue-on-error: true   # upload results even on failure

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  update-manifest-dev:
    name: GitOps — Dev Overlay
    runs-on: ubuntu-latest
    needs: [build, scan-image]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update dev overlay
        run: |
          chmod +x scripts/gitops-update-image.sh
          ./scripts/gitops-update-image.sh bid-service dev "${{ github.sha }}" "${{ github.repository_owner }}"
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/k8s/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(gitops): bid-service dev → sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push

  update-manifest-prod:
    name: GitOps — Prod & Staging Overlays
    runs-on: ubuntu-latest
    needs: [build, scan-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update prod & staging overlays
        run: |
          chmod +x scripts/gitops-update-image.sh
          ./scripts/gitops-update-image.sh bid-service prod "${{ github.sha }}" "${{ github.repository_owner }}"
          ./scripts/gitops-update-image.sh bid-service staging "${{ github.sha }}" "${{ github.repository_owner }}"
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/k8s/overlays/prod/kustomization.yaml \
                  deployments/k8s/overlays/staging/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(gitops): bid-service prod/staging → sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push
