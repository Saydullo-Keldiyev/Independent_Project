apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auction-system-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: auction-system
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: auction-system
  source:
    repoURL: https://github.com/Saydullo-Keldiyev/auction-system
    targetRevision: main
    path: deployments/k8s/overlays/staging
    kustomize:
      buildOptions: --load-restrictor LoadRestrictionsNone
  destination:
    server: https://kubernetes.default.svc
    namespace: auction-system-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
