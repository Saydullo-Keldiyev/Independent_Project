version: '3.8'

# Production-ready docker-compose for local development and staging.
# For production: use Kubernetes.

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - auction-net
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: auction-postgres
    environment:
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: auction_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *service-defaults
    image: redis:7.2-alpine
    container_name: auction-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-secret}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: auction-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.5.0
    container_name: auction-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Application Services ────────────────────────────────────────────────────

  user-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: deployments/docker/user.Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-local}
        VERSION: ${VERSION:-dev}
    container_name: auction-user-service
    ports:
      - "8081:8081"
    environment:
      APP_PORT: "8081"
      APP_ENV: ${APP_ENV:-development}
      DB_URL: postgres://auction:${POSTGRES_PASSWORD:-secret}@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  auction-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: deployments/docker/auction.Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-local}
        VERSION: ${VERSION:-dev}
    container_name: auction-auction-service
    ports:
      - "8083:8083"
    environment:
      APP_PORT: "8083"
      APP_ENV: ${APP_ENV:-development}
      DB_URL: postgres://auction:${POSTGRES_PASSWORD:-secret}@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: bid-events
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  bid-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: deployments/docker/bid.Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-local}
        VERSION: ${VERSION:-dev}
    container_name: auction-bid-service
    ports:
      - "8082:8082"
    environment:
      APP_PORT: "8082"
      APP_ENV: ${APP_ENV:-development}
      DB_URL: postgres://auction:${POSTGRES_PASSWORD:-secret}@postgres:5432/auction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: bid-events
      KAFKA_GROUP_ID: bid-service
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      LOCK_TTL_SECONDS: "5"
      RATE_LIMIT_RPS: "100"
      RATE_LIMIT_BURST: "20"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  notification-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: deployments/docker/notification.Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-local}
        VERSION: ${VERSION:-dev}
    container_name: auction-notification-service
    ports:
      - "8084:8084"
    environment:
      APP_PORT: "8084"
      APP_ENV: ${APP_ENV:-development}
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPICS: bid-events
      KAFKA_GROUP_ID: notification-service
    depends_on:
      kafka:
        condition: service_healthy

  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: deployments/docker/gateway.Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-local}
        VERSION: ${VERSION:-dev}
    container_name: auction-api-gateway
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      USER_SERVICE_URL: http://user-service:8081
      AUCTION_SERVICE_URL: http://auction-service:8083
      BID_SERVICE_URL: http://bid-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      RATE_LIMIT_PER_MINUTE: "100"
      PROXY_TIMEOUT_SEC: "30"
      PROXY_RETRIES: "2"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      auction-service:
        condition: service_healthy
      bid-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  auction-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
