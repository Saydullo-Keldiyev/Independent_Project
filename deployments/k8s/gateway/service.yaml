apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: auction-system
  labels:
    app: api-gateway
spec:
  # ClusterIP for internal access; Ingress handles external traffic
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
