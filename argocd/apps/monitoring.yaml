apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auction-system-monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: auction-system
    app.kubernetes.io/component: monitoring
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: auction-system
  source:
    repoURL: https://github.com/Saydullo-Keldiyev/auction-system
    targetRevision: HEAD
    path: deployments/k8s/platform/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
