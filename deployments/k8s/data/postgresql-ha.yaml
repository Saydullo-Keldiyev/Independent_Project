# PostgreSQL HA using CloudNativePG Operator
# Requirements: 17.2 - Synchronous replica in different AZ, auto-promotion within 30s
#
# CloudNativePG operator must be installed:
#   kubectl apply -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.22/releases/cnpg-1.22.0.yaml
#
# This creates:
#   - 1 primary instance
#   - 1 synchronous replica in a different AZ
#   - Automatic failover with promotion within 30 seconds
#   - WAL archiving for point-in-time recovery
#   - Scheduled backups every 6 hours
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auction-db
  namespace: auction-system
  labels:
    app: postgresql
    component: database
    part-of: auction-system
spec:
  description: "Auction System PostgreSQL HA Cluster"
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2

  # 2 instances: 1 primary + 1 synchronous replica
  instances: 2

  # Synchronous replication — ensures zero data loss on failover
  postgresql:
    parameters:
      # Synchronous replication settings
      synchronous_commit: "on"
      synchronous_standby_names: "*"
      # Performance tuning
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "8MB"
      maintenance_work_mem: "128MB"
      max_connections: "200"
      # WAL settings for PITR
      wal_level: "replica"
      max_wal_senders: "10"
      max_replication_slots: "10"
      wal_keep_size: "1GB"
      archive_mode: "on"
      # Logging
      log_statement: "ddl"
      log_min_duration_statement: "1000"
      log_checkpoints: "on"
      log_lock_waits: "on"
    pg_hba:
      - host all all 10.0.0.0/8 scram-sha-256
      - host replication all 10.0.0.0/8 scram-sha-256

  # Failover configuration — promotion within 30 seconds
  # CloudNativePG default failover detection is ~30s (health check interval × failure threshold)
  startDelay: 30
  stopDelay: 30
  primaryUpdateStrategy: unsupervised
  failoverDelay: 0

  # Ensure primary and replica are in different AZs
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          cnpg.io/cluster: auction-db

  # Anti-affinity: never schedule 2 instances on same node
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required

  # Storage configuration
  storage:
    storageClass: fast-ssd
    size: 50Gi

  # WAL storage on separate volume for better I/O
  walStorage:
    storageClass: fast-ssd
    size: 10Gi

  # Resource limits
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  # Superuser secret
  superuserSecret:
    name: auction-db-superuser

  # Bootstrap from scratch (initial setup)
  bootstrap:
    initdb:
      database: auction_db
      owner: auction_user
      secret:
        name: auction-db-app-credentials
      postInitTemplateSQL:
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        - CREATE EXTENSION IF NOT EXISTS "pg_stat_statements";

  # Backup configuration — WAL archiving + scheduled base backups
  backup:
    barmanObjectStore:
      destinationPath: "s3://auction-system-backups/postgresql/"
      s3Credentials:
        accessKeyId:
          name: auction-db-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: auction-db-backup-credentials
          key: SECRET_ACCESS_KEY
        region:
          name: auction-db-backup-credentials
          key: AWS_REGION
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
    retentionPolicy: "90d"

  # Monitoring — Prometheus metrics
  monitoring:
    enablePodMonitor: true
    customQueriesConfigMap:
      - name: auction-db-custom-queries
        key: queries

  # Managed roles
  managed:
    roles:
      - name: auction_user
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        passwordSecret:
          name: auction-db-app-credentials

---
# Scheduled backup every 6 hours (Requirement 7.3)
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: auction-db-backup-6h
  namespace: auction-system
spec:
  schedule: "0 */6 * * *"
  backupOwnerReference: self
  cluster:
    name: auction-db
  immediate: false

---
# Application credentials secret (sealed in production via SealedSecrets)
apiVersion: v1
kind: Secret
metadata:
  name: auction-db-app-credentials
  namespace: auction-system
  labels:
    app: postgresql
type: kubernetes.io/basic-auth
stringData:
  username: auction_user
  password: "CHANGE_ME_IN_PRODUCTION"  # Replace with SealedSecret or Vault reference

---
# Superuser credentials secret
apiVersion: v1
kind: Secret
metadata:
  name: auction-db-superuser
  namespace: auction-system
  labels:
    app: postgresql
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: "CHANGE_ME_IN_PRODUCTION"  # Replace with SealedSecret or Vault reference

---
# Backup credentials secret
apiVersion: v1
kind: Secret
metadata:
  name: auction-db-backup-credentials
  namespace: auction-system
  labels:
    app: postgresql
type: Opaque
stringData:
  ACCESS_KEY_ID: "CHANGE_ME"
  SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_REGION: "us-east-1"

---
# Custom Prometheus queries for monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: auction-db-custom-queries
  namespace: auction-system
data:
  queries: |
    pg_replication_lag:
      query: "SELECT CASE WHEN pg_is_in_recovery() THEN EXTRACT(EPOCH FROM (now() - pg_last_xact_replay_timestamp())) ELSE 0 END AS lag_seconds"
      master: true
      metrics:
        - lag_seconds:
            usage: "GAUGE"
            description: "Replication lag in seconds"

    pg_database_size:
      query: "SELECT datname, pg_database_size(datname) as size_bytes FROM pg_database WHERE datname = 'auction_db'"
      master: true
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - size_bytes:
            usage: "GAUGE"
            description: "Database size in bytes"

    pg_active_connections:
      query: "SELECT count(*) as active FROM pg_stat_activity WHERE state = 'active'"
      master: true
      metrics:
        - active:
            usage: "GAUGE"
            description: "Active connections"

---
# PodMonitor for Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: auction-db-monitor
  namespace: auction-system
  labels:
    app: postgresql
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: auction-db
  podMetricsEndpoints:
    - port: metrics

---
# Service for application read-write access (points to primary)
apiVersion: v1
kind: Service
metadata:
  name: auction-db-rw
  namespace: auction-system
  labels:
    app: postgresql
    role: primary
spec:
  type: ClusterIP
  selector:
    cnpg.io/cluster: auction-db
    role: primary
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432

---
# Service for read-only access (points to replicas)
apiVersion: v1
kind: Service
metadata:
  name: auction-db-ro
  namespace: auction-system
  labels:
    app: postgresql
    role: replica
spec:
  type: ClusterIP
  selector:
    cnpg.io/cluster: auction-db
    role: replica
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
