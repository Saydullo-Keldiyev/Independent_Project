name: Full Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit Tests (all services) ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/bid-service
          - services/user-service
          - services/payment-service
          - services/notification-service
          - services/search-service
          - services/analytics-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Run tests — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          go mod download
          go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Enforce 80% coverage gate — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage for ${{ matrix.service }}: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 80% threshold for ${{ matrix.service }}"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% passes 80% threshold"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
        continue-on-error: true

  # ── Property-Based Tests (rapid, 100+ iterations) ─────────────────────────────
  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - pkg/lock
          - pkg/circuitbreaker
          - pkg/logger
          - pkg/kafka
          - pkg/ratelimit
          - pkg/validation
          - api-gateway
          - services/payment-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.package }}/go.sum

      - name: Run property-based tests — ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: |
          go mod download
          # Find and run property-based tests with rapid (100+ iterations)
          PROP_FILES=$(grep -rl "rapid\." --include="*_test.go" . || true)
          if [ -n "$PROP_FILES" ]; then
            echo "Found property tests in: $PROP_FILES"
            go test -race -run "Property|Prop" -count=1 -timeout=300s -rapid.checks=100 ./...
          else
            echo "ℹ️  No property-based tests found in ${{ matrix.package }}, skipping."
          fi

  # ── Integration Tests ────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, property-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: auction_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run integration tests
        env:
          DB_URL: postgres://auction:secret@localhost:5432/auction_db?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: |
          if [ -d "tests/integration" ]; then
            cd tests/integration
            go test -race -timeout 120s ./...
          fi

  # ── Load Tests (on main only) ───────────────────────────────────────────────
  load-tests:
    name: Load Tests (Smoke)
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run smoke load test (30s, 10 VUs)
        run: |
          k6 run tests/load/k6/bid_load_test.js \
            --duration 30s \
            --vus 10 \
            --env BASE_URL=http://localhost:8080 \
            --env AUTH_TOKEN=test \
            || true  # don't fail CI on load test
        continue-on-error: true
