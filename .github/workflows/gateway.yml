name: API Gateway CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "api-gateway/**"
      - ".github/workflows/gateway.yml"
  pull_request:
    branches: [main]
    paths:
      - "api-gateway/**"

env:
  SERVICE:      api-gateway
  SERVICE_PATH: api-gateway
  REGISTRY:     ghcr.io
  IMAGE:        ghcr.io/${{ github.repository_owner }}/api-gateway
  GO_VERSION:   "1.22"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: api-gateway/go.sum
      - run: go mod download
      - run: go mod verify
      - run: go test -race -coverprofile=coverage.out ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api-gateway
          args: --timeout=5m

  security-sast:
    name: SAST
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./api-gateway/...

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, security-sast]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/gateway.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

  update-manifest-dev:
    name: GitOps — Dev Overlay
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          chmod +x scripts/gitops-update-image.sh
          ./scripts/gitops-update-image.sh api-gateway dev "${{ github.sha }}" "${{ github.repository_owner }}"
      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/k8s/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(gitops): api-gateway dev → sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push

  update-manifest-prod:
    name: GitOps — Prod & Staging Overlays
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          chmod +x scripts/gitops-update-image.sh
          ./scripts/gitops-update-image.sh api-gateway prod "${{ github.sha }}" "${{ github.repository_owner }}"
          ./scripts/gitops-update-image.sh api-gateway staging "${{ github.sha }}" "${{ github.repository_owner }}"
      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/k8s/overlays/prod/kustomization.yaml \
                  deployments/k8s/overlays/staging/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(gitops): api-gateway prod/staging → sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push
