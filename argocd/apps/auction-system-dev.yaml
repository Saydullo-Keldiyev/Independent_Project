apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auction-system-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: auction-system
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: auction-system
  source:
    repoURL: https://github.com/Saydullo-Keldiyev/auction-system
    targetRevision: develop
    path: deployments/k8s/overlays/dev
    kustomize:
      buildOptions: --load-restrictor LoadRestrictionsNone
  destination:
    server: https://kubernetes.default.svc
    namespace: auction-system-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
