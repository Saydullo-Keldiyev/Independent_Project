openapi: 3.0.3
info:
  title: Notification Service API
  description: |
    Manages real-time notifications via WebSocket and notification history.
    Consumes events from Kafka and delivers notifications to connected clients.

    ## API Versioning
    - Current versions: v1
    - Version prefix: /api/v1
    - Backward compatibility guaranteed within major version for 6 months minimum
    - Deprecated versions include `Deprecation` header with sunset date (RFC 7231)
    - After sunset date, endpoints return HTTP 410

    ## Deprecation Policy
    - Deprecated endpoints are announced 90+ days before removal
    - CHANGELOG.md documents all additions, deprecations, and breaking changes
  version: 1.0.0
  contact:
    name: Platform Team
    email: platform@auction.com

servers:
  - url: http://localhost:8085
    description: Local Development (Direct)
  - url: http://localhost:8080
    description: Local Development (via API Gateway)
  - url: https://api.auction.com
    description: Production

tags:
  - name: Notifications
    description: Notification history and management
  - name: Health
    description: Service health endpoints

paths:
  /api/v1/notifications:
    get:
      tags: [Notifications]
      operationId: getNotifications
      summary: Get notification history
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: unread_only
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Notification list with unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          description: Unauthorized

  /api/v1/notifications/{id}/read:
    post:
      tags: [Notifications]
      operationId: markAsRead
      summary: Mark notification as read
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Marked as read
        '400':
          description: Invalid UUID format
        '401':
          description: Unauthorized
        '404':
          description: Notification not found

  /api/v1/notifications/read-all:
    post:
      tags: [Notifications]
      operationId: markAllAsRead
      summary: Mark all notifications as read
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All notifications marked as read
        '401':
          description: Unauthorized

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive

  /ready:
    get:
      tags: [Health]
      operationId: readinessCheck
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
        '503':
          description: Dependencies unhealthy

  /metrics:
    get:
      tags: [Health]
      operationId: getMetrics
      summary: Prometheus metrics endpoint
      responses:
        '200':
          description: Prometheus text format metrics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [bid_placed, bid_outbid, auction_won, auction_ended, payment_received, system]
        title:
          type: string
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        read:
          type: boolean
        created_at:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            notifications:
              type: array
              items:
                $ref: '#/components/schemas/NotificationResponse'
            unread_count:
              type: integer
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        correlation_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
