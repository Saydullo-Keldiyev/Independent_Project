# Gitleaks configuration for auction-system
# This config extends the default ruleset with project-specific allowlists

title = "Auction System Gitleaks Config"

[extend]
# Use the default gitleaks rules as a base
useDefault = true

[allowlist]
description = "Global allowlist"
paths = [
    '''\.env\.example$''',
    '''go\.sum$''',
    '''\.kiro/''',
    '''testdata/''',
    '''_test\.go$''',
]
