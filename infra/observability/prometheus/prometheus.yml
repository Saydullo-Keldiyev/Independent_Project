global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: auction-system
    env: development

scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway
  - job_name: api-gateway
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /metrics

  # Bid Service
  - job_name: bid-service
    static_configs:
      - targets: ['host.docker.internal:8082']
    metrics_path: /metrics

  # User Service
  - job_name: user-service
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: /metrics

  # Auction Service
  - job_name: auction-service
    static_configs:
      - targets: ['host.docker.internal:8083']
    metrics_path: /metrics

  # Redis exporter (optional — add redis_exporter container)
  - job_name: redis
    static_configs:
      - targets: ['host.docker.internal:9121']

  # Postgres exporter (optional — add postgres_exporter container)
  - job_name: postgres
    static_configs:
      - targets: ['host.docker.internal:9187']
