name: Reusable Go Service Pipeline

# Called by individual service workflows
on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "e.g. bid-service"
      service-path:
        required: true
        type: string
        description: "e.g. services/bid-service"
      dockerfile:
        required: true
        type: string
        description: "e.g. deployments/docker/bid.Dockerfile"
      go-version:
        required: false
        type: string
        default: "1.22"
      coverage-threshold:
        required: false
        type: string
        default: "70"
    secrets:
      REGISTRY_TOKEN:
        required: false
    outputs:
      image-digest:
        description: "Published image digest"
        value: ${{ jobs.build.outputs.image-digest }}

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/${{ inputs.service-name }}

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service-path }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.service-path }}/go.sum

      - name: Download & verify deps
        run: |
          go mod download
          go mod verify

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < ${{ inputs.coverage-threshold }}" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% < ${{ inputs.coverage-threshold }}%"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ inputs.service-path }}
          args: --timeout=5m

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true    # SLSA provenance attestation
          sbom: true          # inline SBOM

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        run: cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
        continue-on-error: true

  update-manifest-dev:
    name: GitOps — Dev Overlay
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update dev overlay image tag
        run: |
          chmod +x scripts/gitops-update-image.sh
          ./scripts/gitops-update-image.sh \
            "${{ inputs.service-name }}" dev "${{ github.sha }}" "${{ github.repository_owner }}"
      - name: Commit manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/k8s/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(gitops): ${{ inputs.service-name }} dev → sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push

  update-manifest-prod:
    name: GitOps — Prod & Staging Overlays
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update prod & staging overlay image tags
        run: |
          chmod +x scripts/gitops-update-image.sh
          ./scripts/gitops-update-image.sh \
            "${{ inputs.service-name }}" prod "${{ github.sha }}" "${{ github.repository_owner }}"
          ./scripts/gitops-update-image.sh \
            "${{ inputs.service-name }}" staging "${{ github.sha }}" "${{ github.repository_owner }}"
      - name: Commit manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/k8s/overlays/prod/kustomization.yaml \
                  deployments/k8s/overlays/staging/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(gitops): ${{ inputs.service-name }} prod/staging → sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push
