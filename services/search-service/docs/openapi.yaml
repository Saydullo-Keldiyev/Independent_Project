openapi: 3.0.3
info:
  title: Search Service API
  description: |
    Full-text search, autocomplete suggestions, and trending searches for auctions.
    Powered by Elasticsearch with Redis caching.

    ## API Versioning
    - Current versions: v1
    - Version prefix: /api/v1
    - Backward compatibility guaranteed within major version for 6 months minimum
    - Deprecated versions include `Deprecation` header with sunset date (RFC 7231)
    - After sunset date, endpoints return HTTP 410

    ## Deprecation Policy
    - Deprecated endpoints are announced 90+ days before removal
    - CHANGELOG.md documents all additions, deprecations, and breaking changes
  version: 1.0.0
  contact:
    name: Platform Team
    email: platform@auction.com

servers:
  - url: http://localhost:8086
    description: Local Development (Direct)
  - url: http://localhost:8080
    description: Local Development (via API Gateway)
  - url: https://api.auction.com
    description: Production

tags:
  - name: Search
    description: Full-text auction search
  - name: Suggestions
    description: Autocomplete and trending
  - name: Health
    description: Service health endpoints

paths:
  /api/v1/search:
    get:
      tags: [Search]
      operationId: searchAuctions
      summary: Search auctions with filters
      description: |
        Full-text search across auction titles and descriptions.
        Results are cached in Redis for performance.
      parameters:
        - name: q
          in: query
          description: Search query string
          schema:
            type: string
            maxLength: 1000
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
        - name: state
          in: query
          description: Filter by auction state
          schema:
            type: string
            enum: [active, scheduled, ended]
        - name: min_price
          in: query
          schema:
            type: number
            format: double
            minimum: 0
        - name: max_price
          in: query
          schema:
            type: number
            format: double
            maximum: 999999999.99
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, newest, ending_soon, most_bids]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
        '503':
          description: Search backend unavailable

  /api/v1/search/suggest:
    get:
      tags: [Suggestions]
      operationId: getSuggestions
      summary: Autocomplete suggestions
      description: Returns up to 10 autocomplete suggestions for partial query.
      parameters:
        - name: q
          in: query
          required: true
          description: Partial search query (minimum 2 characters)
          schema:
            type: string
            minLength: 2
            maxLength: 200
      responses:
        '200':
          description: Autocomplete suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestResponse'
        '400':
          description: Query too short

  /api/v1/search/trending:
    get:
      tags: [Suggestions]
      operationId: getTrendingSearches
      summary: Get trending search queries
      description: Returns top 10 trending search queries by popularity.
      responses:
        '200':
          description: Trending searches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendingResponse'

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive

  /ready:
    get:
      tags: [Health]
      operationId: readinessCheck
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
        '503':
          description: Dependencies unhealthy (Elasticsearch/Redis)

  /metrics:
    get:
      tags: [Health]
      operationId: getMetrics
      summary: Prometheus metrics endpoint
      responses:
        '200':
          description: Prometheus text format metrics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SearchResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/SearchResult'
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer
        cached:
          type: boolean
          description: Whether result was served from cache

    SearchResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        current_price:
          type: number
          format: double
        starting_price:
          type: number
          format: double
        state:
          type: string
          enum: [active, scheduled, ended]
        category:
          type: string
        total_bids:
          type: integer
        end_time:
          type: string
          format: date-time
        seller_id:
          type: string
          format: uuid

    SuggestResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            suggestions:
              type: array
              items:
                type: string
              maxItems: 10

    TrendingResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            searches:
              type: array
              items:
                type: object
                properties:
                  query:
                    type: string
                  count:
                    type: integer
                    format: int64

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        correlation_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
