# NetworkPolicy for auction-service
# Requirement 20.1: api-gateway to auction-service, bid-service to auction-service,
#                    auction-service to notification-service
# Requirement 20.2: Explicit ingress allow rules
# Requirement 20.7: Explicit egress allow rules
#
# Ingress: from api-gateway, from bid-service
# Egress: to notification-service, PostgreSQL, Kafka
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auction-service-ingress
  namespace: auction-system
  labels:
    app.kubernetes.io/part-of: auction-system
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      app: auction-service
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from api-gateway
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8083
    # Allow traffic from bid-service (declared dependency per Req 20.1)
    - from:
        - podSelector:
            matchLabels:
              app: bid-service
      ports:
        - protocol: TCP
          port: 8083
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8083

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auction-service-egress
  namespace: auction-system
  labels:
    app.kubernetes.io/part-of: auction-system
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      app: auction-service
  policyTypes:
    - Egress
  egress:
    # To notification-service (declared dependency per Req 20.1)
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - protocol: TCP
          port: 8084
    # To PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auction-system
          podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # To Kafka (event publishing)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auction-system
          podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
